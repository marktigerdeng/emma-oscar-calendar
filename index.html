<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>📚 Emma & Oscar 课程日历</title>
<style>
:root {
  --emma: #ec4899; --emma-light: #fdf2f8;
  --oscar: #3b82f6; --oscar-light: #eff6ff;
  --family: #10b981; --family-light: #ecfdf5;
  --primary: #6366f1; --primary-dark: #4f46e5;
  --bg: #f1f5f9; --card: #ffffff;
  --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
  --today: #fef3c7; --weekend: #fef2f2;
  --radius: 12px; --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 10px; }
.app { max-width: 900px; margin: 0 auto; }

/* Loading */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; transition: opacity 0.3s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Toast */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; z-index: 10000; opacity: 0; transition: all 0.3s; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Empty State */
.empty-state { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-state-icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state-text { font-size: 1rem; }

/* Header */
.header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; padding: 16px; border-radius: var(--radius); margin-bottom: 10px; text-align: center; box-shadow: var(--shadow); }
.header h1 { font-size: 1.3rem; margin-bottom: 4px; }
.header p { font-size: 0.8rem; opacity: 0.9; }

/* Toolbar */
.toolbar { display: flex; gap: 6px; padding: 10px; background: var(--card); border-radius: var(--radius); margin-bottom: 10px; justify-content: center; flex-wrap: wrap; box-shadow: var(--shadow); }
.btn { padding: 8px 14px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; background: var(--bg); color: var(--text); transition: all 0.2s; }
.btn:hover { background: var(--border); }
.btn.primary { background: var(--primary); color: white; }
.btn.primary:hover { background: var(--primary-dark); }

/* Filters */
.filters { display: flex; gap: 6px; padding: 10px; background: var(--card); border-radius: var(--radius); margin-bottom: 10px; justify-content: center; flex-wrap: wrap; box-shadow: var(--shadow); }
.chip { padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
.chip:hover { transform: translateY(-1px); }
.chip.emma { background: var(--emma-light); color: var(--emma); border-color: var(--emma); }
.chip.oscar { background: var(--oscar-light); color: var(--oscar); border-color: var(--oscar); }
.chip.family { background: var(--family-light); color: var(--family); border-color: var(--family); }
.chip.off { background: var(--bg); color: var(--muted); border-color: var(--border); opacity: 0.5; }

/* Week View */
.week-view { display: flex; flex-direction: column; gap: 8px; }
.day-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.day-header { padding: 12px 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; background: var(--bg); border-bottom: 1px solid var(--border); font-size: 0.9rem; }
.day-header.today { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color: white; }
.day-body { padding: 10px 14px; }
.day-body.empty { color: var(--muted); text-align: center; padding: 24px; font-style: italic; }
.event { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.event:last-child { border-bottom: none; }
.event-dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
.event-dot.emma { background: var(--emma); }
.event-dot.oscar { background: var(--oscar); }
.event-dot.family { background: var(--family); }
.event-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 3px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
.event-meta { font-size: 0.75rem; color: var(--muted); display: flex; flex-wrap: wrap; gap: 8px; }
.tag { display: inline-block; padding: 2px 6px; border-radius: 8px; font-size: 0.65rem; font-weight: 700; }
.tag.emma { background: var(--emma-light); color: var(--emma); }
.tag.oscar { background: var(--oscar-light); color: var(--oscar); }
.tag.family { background: var(--family-light); color: var(--family); }

/* Month View */
.month-view { display: none; background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
.month-view.active { display: block; }
.month-header { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--bg); border-bottom: 1px solid var(--border); }
.month-header-cell { padding: 10px 2px; text-align: center; font-size: 0.8rem; font-weight: 700; color: var(--muted); }
.month-header-cell.weekend { color: #ef4444; }
.month-body { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); grid-auto-rows: minmax(85px, auto); }
.month-cell { min-height: 85px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px; cursor: pointer; transition: background 0.15s; overflow: hidden; }
.month-cell:nth-child(7n) { border-right: none; }
.month-cell:hover { background: var(--bg); }
.month-cell.other-month { background: #f8fafc; color: #94a3b8; }
.month-cell.today { background: var(--today); }
.month-cell.weekend { background: var(--weekend); }
.cell-date { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
.cell-date.weekend { color: #ef4444; }
.month-cell.today .cell-date { background: var(--primary); color: white; width: 26px; height: 26px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 0.8rem; }
.cell-event { font-size: 0.7rem; padding: 3px 5px; border-radius: 4px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
.cell-event.emma { background: var(--emma-light); color: var(--emma); }
.cell-event.oscar { background: var(--oscar-light); color: var(--oscar); }
.cell-event.family { background: var(--family-light); color: var(--family); }
.cell-more { font-size: 0.65rem; color: var(--muted); text-align: center; padding: 2px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); }
.modal-overlay.active { display: flex; }
.modal { background: var(--card); border-radius: var(--radius); max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 25px rgba(0,0,0,0.2); animation: modalIn 0.2s ease-out; }
@keyframes modalIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.modal-header h2 { font-size: 1.1rem; font-weight: 700; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); cursor: pointer; font-size: 1.2rem; color: var(--muted); transition: all 0.15s; }
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-body { padding: 16px 20px; }
.modal-event { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); align-items: flex-start; }
.modal-event:last-child { border-bottom: none; }
.modal-bar { width: 4px; min-height: 44px; border-radius: 2px; flex-shrink: 0; }
.modal-bar.emma { background: var(--emma); }
.modal-bar.oscar { background: var(--oscar); }
.modal-bar.family { background: var(--family); }
.modal-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; display: flex; align-items: center; flex-wrap: wrap; gap: 6px; }
.modal-detail { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

/* Stats */
.stats { display: flex; gap: 10px; padding: 14px; background: var(--card); border-radius: var(--radius); margin-top: 10px; justify-content: center; flex-wrap: wrap; box-shadow: var(--shadow); }
.stat { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 600; padding: 8px 14px; background: var(--bg); border-radius: 10px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Mobile */
@media (max-width: 600px) {
  body { padding: 8px; }
  .header { padding: 14px; }
  .header h1 { font-size: 1.2rem; }
  .toolbar { padding: 8px; }
  .btn { padding: 6px 12px; font-size: 0.8rem; }
  .filters { padding: 8px; }
  .chip { padding: 5px 10px; font-size: 0.7rem; }
  .day-header { padding: 10px 12px; font-size: 0.85rem; }
  .day-body { padding: 8px 12px; }
  .event { padding: 8px 0; }
  .event-title { font-size: 0.85rem; }
  .month-cell { min-height: 48px; padding: 3px; }
  .month-header-cell { padding: 6px 1px; font-size: 0.65rem; }
  .cell-date { font-size: 0.75rem; }
  .month-cell.today .cell-date { width: 20px; height: 20px; font-size: 0.7rem; }
  .cell-event { font-size: 0.6rem; padding: 2px 3px; }
  .cell-more { font-size: 0.55rem; }
}

@media (max-width: 380px) {
  .month-cell { min-height: 42px; padding: 2px; }
  .cell-date { font-size: 0.7rem; }
  .cell-event { font-size: 0.55rem; }
}
</style>

let currentView = 'week';
let weekStart = getMonday(new Date());
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let filters = { Emma: true, Oscar: true, "家庭": true };

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date;
}

function formatDate(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}

function getCoursesForDate(dateStr) {
  return courses.filter(c => c.date === dateStr && filters[c.kid]).sort((a, b) => (a.start_time || "").localeCompare(b.start_time || ""));
}

function kidClass(kid) {
  return kid === "Emma" ? "emma" : kid === "Oscar" ? "oscar" : "family";
}

function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

function toggleView() {
  currentView = currentView === 'week' ? 'month' : 'week';
  document.getElementById('viewBtn').textContent = currentView === 'week' ? '📅 月视图' : '📋 周视图';
  document.getElementById('weekView').style.display = currentView === 'week' ? 'flex' : 'none';
  document.getElementById('monthView').classList.toggle('active', currentView === 'month');
  showToast(currentView === 'week' ? '切换到周视图' : '切换到月视图');
  render();
}

function changeWeek(dir) {
  if (currentView === 'week') {
    weekStart.setDate(weekStart.getDate() + dir * 7);
  } else {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  }
  render();
}

function goToday() {
  const now = new Date();
  weekStart = getMonday(now);
  currentMonth = now.getMonth();
  currentYear = now.getFullYear();
  showToast('回到今天');
  render();
}

function toggleFilter(kid) {
  filters[kid] = !filters[kid];
  document.getElementById("f" + kid).classList.toggle("off", !filters[kid]);
  const activeFilters = Object.entries(filters).filter(([k, v]) => v).map(([k]) => k).join(", ");
  showToast('筛选: ' + activeFilters);
  render();
}

function openModal(dateStr) {
  const d = new Date(dateStr);
  const dayNames = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
  document.getElementById("modalTitle").textContent = dateStr + " " + dayNames[d.getDay()];
  const events = getCoursesForDate(dateStr);
  let html = "";
  if (events.length === 0) {
    html = '<div class="empty-state"><div class="empty-state-icon">🎉</div><div class="empty-state-text">这天没有课程安排</div></div>';
  } else {
    events.forEach(ev => {
      const timeStr = ev.start_time ? `${ev.start_time}-${ev.end_time}` : "全天";
      html += `<div class="modal-event">
        <div class="modal-bar ${kidClass(ev.kid)}"></div>
        <div>
          <div class="modal-title">${ev.course}<span class="tag ${kidClass(ev.kid)}">${ev.kid}</span></div>
          <div class="modal-detail">🕐 ${timeStr}${ev.location ? " 📍 " + ev.location : ""}${ev.fee ? " 💰$" + ev.fee : ""}</div>
        </div>
      </div>`;
    });
  }
  document.getElementById("modalBody").innerHTML = html;
  document.getElementById("modal").classList.add("active");
}

function closeModal() {
  document.getElementById("modal").classList.remove("active");
}

function render() {
  const todayStr = formatDate(new Date());
  if (currentView === 'week') {
    renderWeek(todayStr);
  } else {
    renderMonth(todayStr);
  }
  renderStats();
}

function renderWeek(todayStr) {
  const dayNames = ["周一", "周二", "周三", "周四", "周五", "周六", "周日"];
  let html = "";
  let hasEvents = false;
  
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    const dateStr = formatDate(d);
    const isToday = dateStr === todayStr;
    const events = getCoursesForDate(dateStr);
    if (events.length > 0) hasEvents = true;
    
    html += `<div class="day-card">
      <div class="day-header ${isToday ? "today" : ""}">
        <strong>${d.getMonth()+1}/${d.getDate()}</strong> ${dayNames[i]}
      </div>
      <div class="day-body ${events.length === 0 ? "empty" : ""}">`;
    
    if (events.length === 0) {
      html += "🎉 没有课程";
    } else {
      events.forEach(ev => {
        const timeStr = ev.start_time ? `${ev.start_time}-${ev.end_time}` : "全天";
        html += `<div class="event">
          <div class="event-dot ${kidClass(ev.kid)}"></div>
          <div>
            <div class="event-title">${ev.course}<span class="tag ${kidClass(ev.kid)}">${ev.kid}</span></div>
            <div class="event-meta">🕐 ${timeStr}${ev.location ? " 📍 " + ev.location : ""}${ev.fee ? " 💰$" + ev.fee : ""}</div>
          </div>
        </div>`;
      });
    }
    html += "</div></div>";
  }
  
  // 如果筛选后整周都没有课程，显示空状态
  if (!hasEvents && Object.values(filters).some(f => !f)) {
    html = '<div class="empty-state"><div class="empty-state-icon">🔍</div><div class="empty-state-text">本周没有符合筛选条件的课程<br>试试调整筛选器</div></div>';
  }
  
  document.getElementById("weekView").innerHTML = html;
}

function renderMonth(todayStr) {
  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevMonthDays = new Date(currentYear, currentMonth, 0).getDate();
  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
  const isMobile = window.innerWidth <= 600;
  
  let html = "";
  let hasEvents = false;
  
  for (let i = 0; i < totalCells; i++) {
    let dayNum, dateStr, isOther = false;
    if (i < startDow) {
      dayNum = prevMonthDays - startDow + 1 + i;
      dateStr = formatDate(new Date(currentYear, currentMonth - 1, dayNum));
      isOther = true;
    } else if (i - startDow >= daysInMonth) {
      dayNum = i - startDow - daysInMonth + 1;
      dateStr = formatDate(new Date(currentYear, currentMonth + 1, dayNum));
      isOther = true;
    } else {
      dayNum = i - startDow + 1;
      dateStr = formatDate(new Date(currentYear, currentMonth, dayNum));
    }
    const dow = i % 7;
    const isWeekend = dow >= 5;
    const isToday = dateStr === todayStr;
    const events = getCoursesForDate(dateStr);
    if (events.length > 0) hasEvents = true;
    
    html += `<div class="month-cell ${isOther ? "other-month" : ""} ${isToday ? "today" : ""} ${isWeekend ? "weekend" : ""}" onclick="openModal('${dateStr}')">
      <div class="cell-date ${isWeekend ? "weekend" : ""}">${dayNum}</div>`;
    
    if (!isMobile) {
      events.slice(0, 2).forEach(ev => {
        html += `<div class="cell-event ${kidClass(ev.kid)}">${ev.course}</div>`;
      });
    } else {
      events.slice(0, 1).forEach(ev => {
        html += `<div class="cell-event ${kidClass(ev.kid)}">${ev.course.substring(0, 4)}</div>`;
      });
    }
    
    if (events.length > (isMobile ? 1 : 2)) {
      html += `<div class="cell-more">+${events.length - (isMobile ? 1 : 2)}</div>`;
    }
    html += "</div>";
  }
  
  // 如果筛选后整月都没有课程，显示空状态
  if (!hasEvents && Object.values(filters).some(f => !f)) {
    html = '<div style="grid-column: span 7; padding: 40px; text-align: center; color: #64748b;"><div style="font-size: 3rem; margin-bottom: 12px;">🔍</div><div>本月没有符合筛选条件的课程<br>试试调整筛选器</div></div>';
  }
  
  document.getElementById("monthBody").innerHTML = html;
}

function renderStats() {
  let count = 0, emma = 0, oscar = 0, family = 0;
  if (currentView === 'week') {
    for (let i = 0; i < 7; i++) {
      const d = new Date(weekStart);
      d.setDate(weekStart.getDate() + i);
      const events = getCoursesForDate(formatDate(d));
      count += events.length;
      emma += events.filter(c => c.kid === "Emma").length;
      oscar += events.filter(c => c.kid === "Oscar").length;
      family += events.filter(c => c.kid === "家庭").length;
    }
  } else {
    const start = new Date(currentYear, currentMonth, 1);
    const end = new Date(currentYear, currentMonth + 1, 0);
    const events = courses.filter(c => {
      const d = new Date(c.date);
      return d >= start && d <= end && filters[c.kid];
    });
    count = events.length;
    emma = events.filter(c => c.kid === "Emma").length;
    oscar = events.filter(c => c.kid === "Oscar").length;
    family = events.filter(c => c.kid === "家庭").length;
  }
  document.getElementById("stats").innerHTML = `
    <div class="stat"><span class="stat-dot" style="background:#64748b"></span>${currentView === 'week' ? '本周' : '本月'}: <strong>${count}</strong></div>
    <div class="stat"><span class="stat-dot" style="background:#ec4899"></span>Emma: <strong>${emma}</strong></div>
    <div class="stat"><span class="stat-dot" style="background:#3b82f6"></span>Oscar: <strong>${oscar}</strong></div>
    <div class="stat"><span class="stat-dot" style="background:#10b981"></span>家庭: <strong>${family}</strong></div>
  `;
}

// Hide loading after render
window.addEventListener('load', () => {
  render();
  setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
  }, 300);
});

window.addEventListener('resize', () => {
  if (currentView === 'month') render();
});
