<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>课程日历 - Emma & Oscar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 16px;
}
.app {
  max-width: 900px;
  margin: 0 auto;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  overflow: hidden;
}
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #fff;
  padding: 24px;
  text-align: center;
}
.header h1 { font-size: 1.8rem; margin-bottom: 8px; }
.header p { opacity: 0.7; font-size: 0.9rem; }
.toolbar {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  background: #f8f9fb;
  border-bottom: 1px solid #e5e7eb;
  flex-wrap: wrap;
  justify-content: center;
}
.btn {
  padding: 8px 16px;
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.15s;
}
.btn-nav { background: #e5e7eb; color: #374151; }
.btn-nav:hover { background: #d1d5db; }
.btn-today { background: #4f46e5; color: #fff; }
.btn-today:hover { background: #4338ca; }
.month-label {
  font-size: 1.1rem;
  font-weight: 700;
  padding: 8px 20px;
  color: #1a1a2e;
}
.filters {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  justify-content: center;
  flex-wrap: wrap;
}
.filter-chip {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.15s;
}
.filter-chip.emma { background: #fce7f3; color: #be185d; }
.filter-chip.emma.off { background: #f3f4f6; color: #9ca3af; }
.filter-chip.oscar { background: #dbeafe; color: #1e40af; }
.filter-chip.oscar.off { background: #f3f4f6; color: #9ca3af; }
.filter-chip.family { background: #d1fae5; color: #065f46; }
.filter-chip.family.off { background: #f3f4f6; color: #9ca3af; }
.content { padding: 16px; }
.week-view { display: flex; flex-direction: column; gap: 8px; }
.day-card {
  background: #f8f9fb;
  border-radius: 12px;
  overflow: hidden;
}
.day-header {
  padding: 12px 16px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.95rem;
}
.day-header.today { background: #4f46e5; color: #fff; }
.day-header.weekend { color: #ef4444; }
.date-badge {
  background: #e5e7eb;
  padding: 2px 10px;
  border-radius: 6px;
  font-size: 0.8rem;
}
.day-header.today .date-badge { background: rgba(255,255,255,0.2); }
.day-body { padding: 12px 16px; }
.day-body.empty { color: #9ca3af; font-style: italic; padding: 16px; text-align: center; }
.event {
  display: flex;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid #e5e7eb;
  align-items: flex-start;
}
.event:last-child { border-bottom: none; }
.event-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}
.event-dot.emma { background: #ec4899; }
.event-dot.oscar { background: #3b82f6; }
.event-dot.family { background: #10b981; }
.event-info { flex: 1; }
.event-title { font-weight: 600; font-size: 0.95rem; }
.event-meta { font-size: 0.8rem; color: #6b7280; margin-top: 2px; }
.kid-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 0.7rem;
  font-weight: 700;
  margin-left: 6px;
}
.kid-tag.emma { background: #fce7f3; color: #be185d; }
.kid-tag.oscar { background: #dbeafe; color: #1e40af; }
.kid-tag.family { background: #d1fae5; color: #065f46; }
.stats {
  display: flex;
  gap: 16px;
  padding: 16px;
  background: #f8f9fb;
  justify-content: center;
  flex-wrap: wrap;
  border-top: 1px solid #e5e7eb;
}
.stat { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 600; }
.stat-dot { width: 10px; height: 10px; border-radius: 50%; }
.stat-dot.total { background: #6b7280; }
.stat-dot.emma { background: #ec4899; }
.stat-dot.oscar { background: #3b82f6; }
.stat-dot.family { background: #10b981; }
@media (max-width: 600px) {
  html { font-size: 14px; }
  body { padding: 8px; }
  .header { padding: 16px; }
  .header h1 { font-size: 1.4rem; }
}
</style>
</head>

  <div class="content">

</div>

let weekStart = getMonday(new Date());
let filters = { Emma: true, Oscar: true, '家庭': true };

function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date;
}

function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function getCoursesForDate(dateStr) {
  return courses.filter(c => c.date === dateStr && filters[c.kid]).sort((a,b) => (a.start_time||'').localeCompare(b.start_time||''));
}

function navigate(dir) {
  weekStart = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + dir * 7);
  render();
}

function goToday() {
  weekStart = getMonday(new Date());
  render();
}

function toggleFilter(kid) {
  filters[kid] = !filters[kid];
  updateFilters();
  render();
}

function updateFilters() {
  ['Emma', 'Oscar', '家庭'].forEach(kid => {
    const chip = document.getElementById('chip' + (kid === '家庭' ? 'Family' : kid));
    chip.classList.toggle('off', !filters[kid]);
  });
}

function kidClass(kid) {
  return kid === 'Emma' ? 'emma' : kid === 'Oscar' ? 'oscar' : 'family';
}

function render() {
  const todayStr = formatDate(new Date());
  const dayNames = ['星期一','星期二','星期三','星期四','星期五','星期六','星期日'];
  const end = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + 6);
  document.getElementById('monthLabel').textContent = `${weekStart.getFullYear()}年${weekStart.getMonth()+1}月${weekStart.getDate()}日 - ${end.getMonth()+1}月${end.getDate()}日`;

  let html = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i);
    const dateStr = formatDate(d);
    const isToday = dateStr === todayStr;
    const isWeekend = i >= 5;
    const events = getCoursesForDate(dateStr);

    html += `<div class="day-card">
      <div class="day-header${isToday ? ' today' : ''}${isWeekend ? ' weekend' : ''}">
        <span class="date-badge">${d.getDate()}</span> ${dayNames[i]}
      </div>
      <div class="day-body${events.length === 0 ? ' empty' : ''}">`;

    if (events.length === 0) {
      html += '暂无课程';
    } else {
      events.forEach(ev => {
        const timeStr = ev.start_time ? `${ev.start_time} - ${ev.end_time}` : '全天';
        const meta = [timeStr, ev.location, ev.fee ? `$${ev.fee}` : null].filter(Boolean).join(' | ');
        html += `<div class="event">
          <div class="event-dot ${kidClass(ev.kid)}"></div>
          <div class="event-info">
            <div class="event-title">${ev.course} <span class="kid-tag ${kidClass(ev.kid)}">${ev.kid}</span></div>
            <div class="event-meta">${meta}</div>
          </div>
        </div>`;
      });
    }
    html += '</div></div>';
  }
  document.getElementById('weekView').innerHTML = html;

  // Stats
  const weekCourses = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i);
    weekCourses.push(...courses.filter(c => c.date === formatDate(d)));
  }
  const stats = {
    total: weekCourses.length,
    Emma: weekCourses.filter(c => c.kid === 'Emma').length,
    Oscar: weekCourses.filter(c => c.kid === 'Oscar').length,
    family: weekCourses.filter(c => c.kid === '家庭').length
  };
  document.getElementById('stats').innerHTML = `
    <div class="stat"><span class="stat-dot total"></span> 本周: ${stats.total}</div>
    <div class="stat"><span class="stat-dot emma"></span> Emma: ${stats.Emma}</div>
    <div class="stat"><span class="stat-dot oscar"></span> Oscar: ${stats.Oscar}</div>
    <div class="stat"><span class="stat-dot family"></span> 家庭: ${stats.family}</div>
  `;
}

render();
